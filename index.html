<script>
const SB_URL='https://mqfyuprpztiyfpleannt.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xZnl1cHJwenRpeWZwbGVhbm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjg3MjUsImV4cCI6MjA4OTkwNDcyNX0.4Fvc-fNlwhVp0HvOEL-Z92i9W4YvVSAgen0ihBzlGOk';
const sb=supabase.createClient(SB_URL,SB_KEY);
const SOURCES=['PayPal','Oney','Cofidis','Carte bancaire','Virement','Prélèvement','Autre'];

// PIN
let pv=’’,cp=‘1234’;
async function loadPin(){const{data}=await sb.from(‘app_config’).select(‘value’).eq(‘key’,‘pin’).single();if(data)cp=data.value;}
function pi(n){if(pv.length>=4)return;pv+=n;upd();if(pv.length===4)chk();}
function pd(){pv=pv.slice(0,-1);upd();document.getElementById(‘pinError’).textContent=’’;}
function upd(){for(let i=0;i<4;i++)document.getElementById(‘d’+i).className=‘pin-dot’+(i<pv.length?’ filled’:’’);}
async function chk(){await loadPin();if(pv===cp){document.getElementById(‘pinScreen’).style.display=‘none’;document.getElementById(‘appScreen’).style.display=‘block’;init();}else{document.getElementById(‘pinError’).textContent=‘Code incorrect’;pv=’’;upd();}}

let S={data:[],tab:‘all’,fa:‘tous’,fs:‘tous’,fq:’’,modal:null,payId:null,pinModal:false};

async function loadData(){const{data}=await sb.from(‘echeances’).select(’*’).order(‘due’);S.data=data||[];}
function fmt(n){return Number(n).toLocaleString(‘fr-FR’,{minimumFractionDigits:2,maximumFractionDigits:2})+’ €’;}
function nextMonth(s){const d=new Date(s+‘T12:00:00’);d.setMonth(d.getMonth()+1);return d.toISOString().split(‘T’)[0];}

// Retourne le montant du versement N (0-based) pour un achat
function getVersement(d, idx){
if(d.versement_type===‘perso’&&d.versements_perso&&d.versements_perso[idx]){
return parseFloat(d.versements_perso[idx].montant)||0;
}
return parseFloat(d.versement)||0;
}

// Retourne la part copine pour le versement N
function getCopinePart(d, idx){
if(!d.partage) return 0;
const v=getVersement(d,idx);
if(d.partage_type===‘perso’&&d.versements_perso&&d.versements_perso[idx]){
return parseFloat(d.versements_perso[idx].copine_montant)||0;
}
return v/2; // 50/50 par défaut
}

function cmp(d){
const rest=d.total_inst-d.pays;
// Calcul total selon type
let total=0,deja=0,restant=0,partCopine=0;
if(d.versement_type===‘perso’&&d.versements_perso&&d.versements_perso.length){
for(let i=0;i<d.total_inst;i++){
const v=getVersement(d,i);
total+=v;
if(i<d.pays){deja+=v;}
else{restant+=v;if(d.partage&&!d.rembourse)partCopine+=getCopinePart(d,i);}
}
} else {
const v=parseFloat(d.versement)||0;
total=d.montant_total||(v*d.total_inst);
deja=v*d.pays;
restant=v*rest;
if(d.partage&&!d.rembourse){
if(d.partage_type===‘perso’&&d.versements_perso){
for(let i=d.pays;i<d.total_inst;i++) partCopine+=getCopinePart(d,i);
} else partCopine=restant/2;
}
}
const today=new Date();today.setHours(0,0,0,0);
const due=new Date(d.due+‘T12:00:00’);
const jours=Math.round((due-today)/86400000);
const statut=rest===0?‘soldé’:jours<0?‘retard’:jours<=7?‘urgent’:‘ok’;
const lp=d.last_paid_date?new Date(d.last_paid_date+‘T12:00:00’):null;
const nowKey=`${new Date().getMonth()}-${new Date().getFullYear()}`;
const lpKey=lp?`${lp.getMonth()}-${lp.getFullYear()}`:’’;
const payDis=(lpKey===nowKey)||rest===0;
// Montant versement courant (prochain à payer)
const currentVersement=getVersement(d,d.pays);
const currentCopine=getCopinePart(d,d.pays);
return{rest,total,deja,restant,partCopine,jours,statut,payDis,currentVersement,currentCopine};
}

function getMonthData(year, month){
const s=new Date(year,month,1),e=new Date(year,month+1,0);
const moi=[],cop=[];
S.data.forEach(d=>{
const c=cmp(d);if(c.statut===‘soldé’)return;
const due=new Date(d.due+‘T12:00:00’);
if(due>=s&&due<=e){
const mv=c.currentVersement;
const cv=c.currentCopine;
if(d.acheteur===‘Moi’||d.partage) moi.push({n:d.marchand,m:d.partage?mv-cv:mv,p:d.partage});
if(d.acheteur===‘Copine’||d.partage) cop.push({n:d.marchand,m:d.partage?cv:mv,p:d.partage});
}
});
return{moi,cop};
}
function monthData(){const now=new Date();return getMonthData(now.getFullYear(),now.getMonth());}
function nextMonthData(){const now=new Date();const nm=now.getMonth()+1;const ny=nm>11?now.getFullYear()+1:now.getFullYear();return getMonthData(ny,nm>11?0:nm);}
function nextMonthName(){const d=new Date();d.setMonth(d.getMonth()+1);return d.toLocaleDateString(‘fr-FR’,{month:‘long’,year:‘numeric’});}

function filtered(){
const today=new Date();today.setHours(0,0,0,0);
return S.data.filter(d=>{
const c=cmp(d);const due=new Date(d.due+‘T12:00:00’);
if(S.tab===‘all’&&c.statut===‘soldé’)return false;
if(S.tab===‘upcoming’&&(c.statut===‘soldé’||due<today&&c.statut!==‘retard’))return false;
if(S.tab===‘past’&&c.statut!==‘soldé’)return false;
const fa=S.fa;
if(fa===‘moi_all’&&d.acheteur!==‘Moi’)return false;
if(fa===‘moi_solo’&&!(d.acheteur===‘Moi’&&!d.partage))return false;
if(fa===‘cop_all’&&d.acheteur!==‘Copine’)return false;
if(fa===‘cop_solo’&&!(d.acheteur===‘Copine’&&!d.partage))return false;
if(fa===‘partage’&&!d.partage)return false;
if(S.fs!==‘tous’&&d.source!==S.fs)return false;
if(S.fq&&!d.marchand.toLowerCase().includes(S.fq.toLowerCase())&&!(d.notes||’’).toLowerCase().includes(S.fq.toLowerCase()))return false;
return true;
}).sort((a,b)=>new Date(a.due)-new Date(b.due));
}

function kpis(){
let te=0,tr=0,tp=0,mr=0,cr=0;
S.data.forEach(d=>{const c=cmp(d);te+=c.total;tr+=c.restant;if(d.partage)tp+=c.partCopine;if(d.acheteur===‘Moi’)mr+=d.partage?c.restant-c.partCopine:c.restant;if(d.acheteur===‘Copine’)cr+=c.restant;});
return{te,tr,tp,mr,cr};
}

function fd(s){return new Date(s+‘T12:00:00’).toLocaleDateString(‘fr-FR’,{day:‘2-digit’,month:‘short’});}
function fdf(s){return new Date(s+‘T12:00:00’).toLocaleDateString(‘fr-FR’,{day:‘2-digit’,month:‘short’,year:‘numeric’});}
function monthName(){return new Date().toLocaleDateString(‘fr-FR’,{month:‘long’,year:‘numeric’});}
function sBadge(s){const m={soldé:[‘b-done’,‘Soldé’],retard:[‘b-late’,‘Retard’],urgent:[‘b-urgent’,‘Urgent’],ok:[‘b-ok’,‘OK’]};const[c,t]=m[s];return`<span class="badge ${c}">${t}</span>`;}
function aBadge(d){
if(d.partage){
const label=d.partage_type===‘perso’?‘Partagé perso’:‘Partagé 50/50’;
return`<span class="badge b-partage">${label}</span>`;
}
if(d.acheteur===‘Copine’)return`<span class="badge b-copine">Copine</span>`;
return`<span class="badge b-moi">Moi</span>`;
}
function jt(j){if(j<0)return`<span class="red" style="font-weight:700">${Math.abs(j)}j</span>`;if(j===0)return`<span style="color:#D85A30;font-weight:700">Auj.</span>`;if(j<=7)return`<span style="color:#D85A30;font-weight:600">${j}j</span>`;return`<span style="color:#718096">${j}j</span>`;}

function render(){
const k=kpis();
const al=S.data.filter(d=>{const c=cmp(d);return c.statut===‘urgent’||c.statut===‘retard’;}).sort((a,b)=>new Date(a.due)-new Date(b.due));
const rows=filtered();
const md=monthData();
const nmd=nextMonthData();
const tmoi=md.moi.reduce((s,i)=>s+i.m,0);
const tcop=md.cop.reduce((s,i)=>s+i.m,0);
const tnmoi=nmd.moi.reduce((s,i)=>s+i.m,0);

function togglePartageType(){

function updatePersoTotal(){
const nb=parseInt(document.getElementById(‘ft’).value)||4;
let total=0;
for(let i=0;i<nb;i++){const el=document.getElementById(`vp_m_${i}`);if(el)total+=parseFloat(el.value)||0;}
const el=document.getElementById(‘persoTotal’);
if(el)el.textContent=fmt(total);
}

function act(){
const v=parseFloat(document.getElementById(‘fv’)?.value)||0;

const el=document.getElementById(‘ftt’);

}

function updPS(){

const c=cmp(d);
const pt=document.querySelector(‘input[name=“pt”]:checked’)?.value||‘ech’;

const m=pt===‘tot’?c.restant:c.currentVersement;

document.getElementById(‘ps’).innerHTML=h;
}

}

function openPay(id){S.payId=id;render();setTimeout(updPS,50);}

async function togRemb(id,cur){await sb.from(‘echeances’).update({rembourse:!cur}).eq(‘id’,id);await loadData();render();toast(!cur?‘✓ Remboursé’:‘Annulé’);}
async function delItem(id){if(!confirm(‘Supprimer ?’))return;await sb.from(‘echeances’).delete().eq(‘id’,id);await loadData();render();toast(‘Supprimé’);}

async function saveItem(id){
const marchand=document.getElementById(‘fm’).value.trim();
const pays=parseInt(document.getElementById(‘fp’).value)||0;
const total_inst=parseInt(document.getElementById(‘ft’).value)||4;
const due=document.getElementById(‘fd’).value;
const acheteur=document.getElementById(‘fa’).value;
const paVal=document.getElementById(‘fpa’).value;
const partage=paVal!==‘non’;
const partage_type=paVal===‘non’?‘50/50’:paVal;
const source=document.getElementById(‘fsr’).value;
const notes=document.getElementById(‘fn’).value.trim();
const versement_type=document.getElementById(‘fvtype’).value;
if(!marchand||!due){alert(‘Champs obligatoires manquants’);return;}

let versement=0,montant_total=0,versements_perso=null;

if(versement_type===‘perso’){
// Collect versements perso
const showCopine=partage&&partage_type===‘perso’;
versements_perso=[];
let tot=0;
for(let i=0;i<total_inst;i++){
const m=parseFloat(document.getElementById(`vp_m_${i}`)?.value)||0;
const c=showCopine?(parseFloat(document.getElementById(`vp_c_${i}`)?.value)||0):0;
versements_perso.push({montant:m,copine_montant:c});
tot+=m;
}
montant_total=tot;
versement=versements_perso[0]?.montant||0; // premier versement comme référence
} else {
versement=parseFloat(document.getElementById(‘fv’).value)||0;
if(!versement){alert(‘Montant du versement manquant’);return;}
const mr=document.getElementById(‘ftt’).value;
montant_total=mr?parseFloat(mr):versement*total_inst;
}

const item={marchand,versement,montant_total,versement_type,versements_perso,pays,total_inst,due,acheteur,partage,partage_type,source,notes};
if(id!==null){await sb.from(‘echeances’).update(item).eq(‘id’,id);toast(‘Modifié ✓’);}
else{await sb.from(‘echeances’).insert({…item,rembourse:false});toast(‘Ajouté ✓’);}
await loadData();S.modal=null;render();
}

async function confirmPay(id){
const d=S.data.find(x=>x.id===id);if(!d)return;
const c=cmp(d);
const pt=document.querySelector(‘input[name=“pt”]:checked’)?.value||‘ech’;
const cpO=d.partage?(document.querySelector(‘input[name=“cp”]:checked’)?.value===‘oui’):false;
const today=new Date().toISOString().split(‘T’)[0];
let u={last_paid_date:today};
if(pt===‘tot’){
u.pays=d.total_inst;
if(cpO)u.rembourse=true;
} else {
u.pays=d.pays+1;
u.due=nextMonth(d.due); // ← passage automatique au mois suivant
if(d.partage) u.rembourse=cpO?true:false;
}
await sb.from(‘echeances’).update(u).eq(‘id’,id);
await loadData();S.payId=null;render();
toast(’Payé ✓ — Prochaine éch. : ’+fd(u.due||d.due));
}

async function savePin(){
const v=document.getElementById(‘np’).value.trim();
if(!/^\d{4}$/.test(v)){alert(‘4 chiffres requis’);return;}
await sb.from(‘app_config’).upsert({key:‘pin’,value:v});
cp=v;S.pinModal=false;render();toast(‘PIN mis à jour ✓’);
}

function toast(msg){const t=document.createElement(‘div’);t.className=‘toast’;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
async function init(){await loadData();render();}
loadPin();
</script>
